spec_version: 1

name: algo_reasoning_env

description: Algorithm reasoning + code generation + test completion with hybrid grading

version: "1.0.0"

type: coding

runtime: fastapi

app: algo_reasoning_env.server.app:app

port: 7860

endpoints:
  reset: /reset
  step: /step
  state: /state

reward:
  min: 0.0
  max: 1.0

observation_space:
  type: object
  fields:
    session_id: string
    problem_id: integer
    difficulty: string
    problem_description: string
    starter_code: string
    expected_complexity: string

action_space:
  type: object
  fields:
    solution_code: string
    reasoning_steps: string
    time_complexity: string

tasks:
  - name: easy
    difficulty: easy
    description: Easy problem - reasoning + code + tests
    weight: 0.3

  - name: medium
    difficulty: medium
    description: Medium problem - reasoning + code + tests
    weight: 0.5

  - name: hard
    difficulty: hard
    description: Hard problem - reasoning + code + tests
    weight: 1.0
